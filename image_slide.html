<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider & Gallery</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    .main{
      width: 90%;
      max-width: 500px;
      height: 300px;
      margin: 60px auto 20px auto;
      box-shadow: 0 0 9px gray;
      position: relative;
      overflow: hidden;
    }

    .slide{
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease;
      cursor: pointer; 
    }

    .slide.active {
      opacity: 1;
    }

    .btns{
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide_btn{
      padding:10px 15px;
      margin: 20px;
      border: 2px solid rgb(99, 138, 146);
      background-color: rgb(155, 202, 207);
      color: aliceblue;
      font-size: 18px;
      cursor: pointer;
      transition: background-color 0.3s ease, color 0.3s ease, transform 0.2s ease;
    }

    .slide_btn:hover{
      color: rgb(145, 189, 199);
      background-color: aliceblue;
      transform: scale(1.05);
    }
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(255,255,255,0.5);
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .main {
        height: 220px;
      }
      .slide_btn {
        font-size: 16px;
        margin: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="main">
    <img src="img1.jpg" class="slide" alt="Image 1">
    <img src="img2.jpg" class="slide" alt="Image 2">
    <img src="img3.jpg" class="slide" alt="Image 3">
    <img src="img4.jpg" class="slide" alt="Image 4">
  </div>
  <div class="btns">
    <button id="prev" class="slide_btn">Prev</button>
    <button id="next" class="slide_btn">Next</button>
  </div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightboxClose">&times;</span>
    <img id="lightboxImage" src="" alt="Large view">
  </div>

  <script src="image_slide.js"></script>
</body>
</html>
